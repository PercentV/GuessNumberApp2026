<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="css/guessStyle.css" rel="stylesheet" />
</head>
<body class="bg-light mt-4">
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-body shadow">
                        <h1 class="card-title text-uppercase text-center text-secondary-emphasis fw-bold">Guess Number 1 - 10 <i class="fa-regular fa-circle-question"></i></h1>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="container-fluid">
                <div class="d-flex justify-content-center">
                    <div class="d-flex justify-content-center shadow border rounded-5 mt-2 mb-2" style="width: 60px; height: 60px;">
                        <span id="guess-hidden" class="fs-1 fw-bold">?</span>
                        <span id="guess-number" class="fs-1 fw-bold textHidden">1</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="d-flex align-items-end shadow" style="height: 350px;">
                        <div class="card-body">
                            <form class="d-flex justify-content-center mb-3">
                                <input type="number" id="input-guess" class="form-control w-50 shadow fs-3 fw-bold" value="0" placeholder="Guess" />
                            </form>
                            <div class="d-flex justify-content-center">
                                <button id="btn-guess" class="btn btn-primary w-25 me-1 shadow fw-bold fs-4">Guess</button>
                                <button id="btn-again" class="btn btn-success w-25 me-1 shadow fw-bold fs-4">Again</button>
                            </div>
                            <p class="card-text text-center mt-2 fs-5 fw-bold">Message: <span id="text-message"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/guessJs.js"></script>
</body>
</html>
